<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XR Store | لوحة الإدارة</title>
  <meta name="description" content="لوحة تحكم إدارة XR Store لإضافة المنتجات وحذفها وتعديل الأسعار.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar" id="siteHeader"></header>

  <main class="container">
    <section class="section">
      <div class="card admin-box">
        <div class="row">
          <div>
            <h2 class="mb0">لوحة الإدارة</h2>
            <p class="muted">إضافة منتجات وحذفها وتعديل الأسعار</p>
          </div>
          <button class="danger-btn" id="logoutBtn">تسجيل خروج</button>
        </div>

        <form id="adminForm" class="mt18">
          <div class="form-grid">
            <input class="input" id="name" type="text" placeholder="اسم المنتج" required>
            <select class="select" id="category" required>
              <option value="coolers">مبردات</option>
              <option value="cases">كفرات</option>
              <option value="chargers">شواحن</option>
              <option value="cables">كيابل</option>
              <option value="holders">حوامل</option>
              <option value="headphones">سماعات</option>
            </select>
            <input class="input" id="price" type="number" step="0.1" placeholder="السعر" required>
            <input class="input" id="rating" type="number" step="0.1" min="1" max="5" placeholder="التقييم">
            <input class="input full" id="image" type="url" placeholder="رابط صورة المنتج" required>
            <input class="input full" id="features" type="text" placeholder="المميزات مفصولة بفواصل مثال: سريع, خفيف, قوي">
            <input class="input full" id="sizes" type="text" placeholder="المقاسات أو الأنواع مفصولة بفواصل مثال: iPhone, Samsung">
            <textarea class="textarea full" id="desc" placeholder="وصف بسيط للمنتج" required></textarea>
          </div>

          <button class="primary-btn full-btn mt14" type="submit">إضافة المنتج</button>
        </form>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h3>كل المنتجات</h3>
          <p>يمكنك حذف المنتج أو تعديل سعره</p>
        </div>
      </div>
      <div id="productsTableWrap"></div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>

  <script src="data.js"></script>
  <script src="main.js"></script>
  <script src="admin.js"></script>
</body>
</html>
