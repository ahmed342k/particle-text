<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XR Store | تسجيل دخول الإدارة</title>
  <meta name="description" content="تسجيل دخول لوحة تحكم إدارة XR Store.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar" id="siteHeader"></header>

  <main class="login-wrap">
    <div class="card login-card">
      <h2 class="mb0">تسجيل دخول الإدارة</h2>
      <p class="muted">الدخول التجريبي الافتراضي:</p>
      <p class="muted">اسم المستخدم: <strong>xradmin</strong> — كلمة المرور: <strong>123456</strong></p>

      <form id="loginForm" class="mt14">
        <input class="input" id="username" type="text" placeholder="اسم المستخدم" required>
        <input class="input mt10" id="password" type="password" placeholder="كلمة المرور" required>
        <button class="primary-btn full-btn mt14" type="submit">دخول</button>
      </form>
    </div>
  </main>

  <footer class="footer" id="siteFooter"></footer>

  <script src="data.js"></script>
  <script src="main.js"></script>
  <script src="auth.js"></script>
</body>
</html>
