<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XR Store | السلة</title>
  <meta name="description" content="سلة متجر XR لعرض المنتجات المختارة والمجموع الكلي.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar" id="siteHeader"></header>

  <main class="container">
    <section class="section">
      <div class="card page-hero">
        <h2>سلة التسوق</h2>
        <p>هنا تظهر المنتجات التي أضفتها، مع إمكانية تعديل الكمية أو الحذف.</p>
      </div>

      <div id="cartTableWrap"></div>

      <div class="card total-box">
        <div class="row">
          <strong>المجموع الكلي</strong>
          <strong id="totalPrice">$0</strong>
        </div>
        <div class="card-actions mt14">
          <button class="danger-btn" id="clearCartBtn">تفريغ السلة</button>
          <button class="primary-btn" id="checkoutBtn">إكمال الطلب</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" id="siteFooter"></footer>

  <script src="data.js"></script>
  <script src="main.js"></script>
  <script src="cart.js"></script>
</body>
</html>
